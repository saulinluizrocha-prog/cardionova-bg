<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Успешна поръчка!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0883b0 0%, #055a7a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .success-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-wrapper {
            width: 90px;
            height: 90px;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
            opacity: 0;
        }

        .icon-wrapper svg {
            width: 50px;
            height: 50px;
            fill: white;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        h1 {
            color: #0883b0;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
            font-weight: 600;
        }

        .triggers-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .trigger-item {
            background: #fff;
            border-left: 5px solid #ff9800;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            text-align: left;
            font-weight: 700;
            font-size: 16px;
            color: #333;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInRight 0.5s ease forwards;
            opacity: 0;
        }

        .trigger-item:nth-child(1) { animation-delay: 0.5s; border-color: #2196F3; }
        .trigger-item:nth-child(2) { animation-delay: 0.7s; border-color: #4CAF50; }
        .trigger-item:nth-child(3) { 
            animation-delay: 0.9s; 
            border-color: #F44336; 
            background: #fff0f0;
            animation: fadeInRight 0.5s ease forwards, pulse 2s infinite 1.4s;
        }

        .trigger-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .trigger-icon {
            font-size: 28px;
            margin-right: 15px;
            min-width: 35px;
            text-align: center;
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(244, 67, 54, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0); }
        }

        .back-btn {
            display: inline-block;
            background: #0883b0;
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(8, 131, 176, 0.3);
            border: none;
            cursor: pointer;
        }

        .back-btn:hover {
            background: #066d93;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(8, 131, 176, 0.4);
        }
        
        @media (max-width: 600px) {
            .success-card {
                padding: 40px 20px;
            }
            h1 {
                font-size: 28px;
            }
            .trigger-item {
                font-size: 14px;
                padding: 15px;
            }
            .trigger-icon {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
            </svg>
        </div>
        
        <h1>Успешна поръчка!</h1>
        <p class="subtitle">Благодарим ви за доверието!</p>

        <div class="triggers-container">
            <div class="trigger-item">
                <div class="trigger-icon">📱</div>
                <div>Дръжте мобилния си телефон под ръка!</div>
            </div>
            
            <div class="trigger-item">
                <div class="trigger-icon">📞</div>
                <div>Моля, отговаряйте на нашите обаждания!</div>
            </div>

            <div class="trigger-item">
                <div class="trigger-icon">⏳</div>
                <div>Не пропускайте тази оферта в никакъв случай, ще се свържем с вас в рамките на 30 минути!</div>
            </div>
        </div>

        <a href="/" class="back-btn">Обратно в сайта</a>
    </div>

</body>
</html>
